plugins {
    id 'com.android.application'
}

android {
    namespace 'com.xerox3025.printplugin'
    compileSdk 34

    defaultConfig {
        applicationId "com.driverimpresora.xeroxprint"
        minSdk 26
        targetSdk 34
        versionCode Integer.parseInt(project.findProperty("VERSION_CODE") ?: "2")
        versionName project.findProperty("VERSION_NAME") ?: "1.1.0"
    }

    signingConfigs {
        release {
            def ksFile = rootProject.file("release.jks")
            if (ksFile.exists()) {
                storeFile ksFile
                storePassword System.getenv("RELEASE_KEYSTORE_PASSWORD") ?: ""
                keyAlias System.getenv("RELEASE_KEY_ALIAS") ?: ""
                keyPassword System.getenv("RELEASE_KEY_PASSWORD") ?: ""
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            def ksFile = rootProject.file("release.jks")
            signingConfig ksFile.exists() ? signingConfigs.release : signingConfigs.debug
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.preference:preference:1.2.1'
    implementation 'com.google.android.material:material:1.11.0'
}
